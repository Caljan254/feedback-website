<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DEPT OF COMPUTING & IT (ICT) FEEDBACK - SEKU Feedback</title>
    <link rel="icon" type="image/x-icon" href="../../favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        .notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            z-index: 9999;
            max-width: 90%;
            width: auto;
            min-width: 280px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55)
        }

        .notification.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1
        }

        .notification.success {
            background-color: #10B981;
            color: #fff
        }

        .notification.error {
            background-color: #EF4444;
            color: #fff
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh
        }

        .content-wrapper {
            flex: 1 0 auto
        }

        [x-cloak] {
            display: none !important;
        }

        .commitment-card {
            background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100" x-data="{ 
    step: 0, 
    compliments: '', 
    complaints: '', 
    suggestions: '',
    totalSteps: 6,
    validateStep() {
        if (this.step === 0) return true;
        const currentStep = document.querySelector(`.step-${this.step}`);
        if (!currentStep) return true;
        
        let allAnswered = true;
        const blocks = currentStep.querySelectorAll('.dynamic-question-block');
        blocks.forEach(block => {
            const questionId = block.getAttribute('data-question-id');
            const radioChecked = block.querySelector(`input[name*='dq_']:checked`);
            if (!radioChecked) {
                allAnswered = false;
                block.classList.add('ring-2', 'ring-red-500', 'p-2', 'rounded-lg');
            } else {
                block.classList.remove('ring-2', 'ring-red-500', 'p-2');
            }
        });
        if (!allAnswered) {
            window.feedbackPortal?.showNotification('⚠️ Please answer all questions on this page.', 'error');
            return false;
        }
        return true;
    },
    next() { if (this.validateStep()) { this.step++; window.scrollTo({top:0, behavior:'smooth'}); } },
    prev() { this.step--; window.scrollTo({top:0, behavior:'smooth'}); }
}">
    <div id="header-placeholder"></div>

    <div class="content-wrapper max-w-4xl mx-auto px-4 py-8">
        <!-- Step 0: The Commitment Message Card -->
        <div x-show="step === 0" x-transition>
            <div class="commitment-card text-white p-10 md:p-16 rounded-3xl text-center relative overflow-hidden mb-8">
                <div class="relative z-10">
                    <i class="fas fa-university text-5xl text-blue-200 opacity-80 mb-6"></i>
                    <h2 class="text-3xl md:text-4xl font-extrabold mb-8">Directorate Of ICT</h2>
                    <p class="text-xl md:text-2xl italic font-light max-w-2xl mx-auto">
                        "The Directorate Of ICT is committed to improving your digital experience. Your
                        feedback helps us serve you better. Please take a moment to rate us."
                    </p>
                    <div class="mt-12">
                        <button @click="next()"
                            class="bg-white text-blue-700 hover:bg-blue-50 px-12 py-5 rounded-2xl font-black text-xl shadow-2xl transition-all flex items-center gap-4 mx-auto">
                            start feedback <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
                <div class="absolute -right-10 -bottom-10 w-64 h-64 bg-blue-500 rounded-full opacity-20"></div>
            </div>
            <div class="flex justify-center">
                <button onclick="goBack()" class="text-blue-600 font-bold flex items-center gap-2">
                    <i class="fas fa-arrow-left"></i> Change Office
                </button>
            </div>
        </div>

        <!-- Feedback UI -->
        <div x-show="step > 0" x-cloak x-transition>
            <div id="user-info-display" :style="{ display: step > 0 ? 'block' : 'none' }"
                class="bg-blue-50 dark:bg-blue-900/50 p-5 rounded-2xl mb-8 border border-blue-100 dark:border-blue-800">
            </div>

            <section
                class="bg-white dark:bg-gray-800 p-8 md:p-12 rounded-3xl shadow-xl border border-gray-100 dark:border-gray-700">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-10">
                    <div>
                        <h3 class="text-2xl font-black text-gray-900 dark:text-white uppercase tracking-tighter">Dept Of
                            Computing & IT</h3>
                        <p class="text-gray-500 text-sm">Empowering the digital future.</p>
                    </div>
                    <div class="bg-blue-600 text-white px-5 py-2 rounded-2xl font-bold text-sm"
                        x-text="`Step ${step} of ${totalSteps}`"></div>
                </div>

                <form class="department-feedback-form space-y-10"
                    @submit.prevent="window.feedbackPortal.handleDepartmentFormSubmit($event)">

                    <!-- Step 1-6 content... -->
                    <div x-show="step === 1" class="step-1 space-y-10">
                        <div class="dynamic-question-block space-y-4" data-question-id="3">
                            <label class="font-bold text-xl block">1. What was the primary purpose of your visit
                                today?</label>
                            <div class="space-y-3">
                                <template
                                    x-for="opt in ['Advising','Tutorials', 'Research', 'Lab work', 'Lecturer consultation']">
                                    <label
                                        class="flex items-center p-4 rounded-xl border-2 border-gray-50 dark:bg-gray-800 hover:border-blue-500 cursor-pointer transition-all">
                                        <input type="radio" name="dq_3" :value="opt" required class="w-5 h-5">
                                        <span class="ml-4" x-text="opt"></span>
                                    </label>
                                </template>
                            </div>
                        </div>
                    </div>

                    <div x-show="step > 1" class="py-20 text-center">
                        <p class="text-gray-400">Continuing survey...</p>
                    </div>

                    <div class="flex justify-between items-center pt-8 border-t dark:border-gray-700">
                        <button type="button" @click="prev()" x-show="step > 1" class="text-gray-500 font-bold">←
                            Previous</button>
                        <div class="flex-grow"></div>
                        <button type="button" @click="next()" x-show="step < totalSteps"
                            class="bg-blue-600 text-white px-10 py-4 rounded-xl font-bold">Next Stage</button>
                        <button type="submit" x-show="step === totalSteps"
                            class="bg-green-600 text-white px-12 py-4 rounded-xl font-bold">Submit</button>
                    </div>
                </form>
            </section>
        </div>
    </div>

    <script src="../../src/js/load-components.js"></script>
    <script src="../../src/js/feedback-portal.js"></script>
</body>

</html>
