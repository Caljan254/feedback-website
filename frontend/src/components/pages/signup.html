<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>South Eastern Kenya University (SEKU) Feedback System</title>
    <link rel="icon" type="image/x-icon" href="../../../public/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css" />
    <style>
        .notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            z-index: 9999;
            max-width: 90%;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .notification.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .notification.success {
            background-color: #10B981;
            color: white;
        }

        .notification.error {
            background-color: #EF4444;
            color: white;
        }

        .notification.warning {
            background-color: #F59E0B;
            color: white;
        }

        .notification.info {
            background-color: #3B82F6;
            color: white;
        }

        .form-input:focus {
            border-color: #10B981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }
    </style>
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100">
    <!-- Header placeholder -->
    <div id="header-placeholder"></div>

    <main class="flex-grow flex items-center justify-center min-h-screen px-4 pt-24 pb-8">
        <div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-xl shadow-lg p-8">
            <h2 class="text-3xl font-bold mb-6 text-green-700 dark:text-green-400 text-center">
                Create Your Account
            </h2>

            <form id="signupForm" class="space-y-6">
                <div>
                    <label class="text-sm font-medium">Full Name</label>
                    <input required id="fullname"
                        class="form-input w-full px-4 py-3 border rounded-md dark:bg-gray-700" />
                </div>
                <div>
                    <label class="text-sm font-medium">Email Address</label>
                    <input required id="email" type="email"
                        class="form-input w-full px-4 py-3 border rounded-md dark:bg-gray-700" />
                </div>
                <div>
                    <label class="text-sm font-medium">Password</label>
                    <input required id="password" type="password" minlength="6"
                        class="form-input w-full px-4 py-3 border rounded-md dark:bg-gray-700" />
                </div>
                <div>
                    <label class="text-sm font-medium">Confirm Password</label>
                    <input required id="confirmPassword" type="password" minlength="6"
                        class="form-input w-full px-4 py-3 border rounded-md dark:bg-gray-700" />
                </div>
                <div>
                    <label class="text-sm font-medium">I am a</label>
                    <select required id="role" class="form-input w-full px-4 py-3 border rounded-md dark:bg-gray-700">
                        <option value="" disabled selected>Select your role</option>
                        <option value="student">Student</option>
                        <option value="staff">Staff Member</option>
                        <option value="visitor">Visitor</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-md">
                    <i class="fas fa-user-plus mr-2"></i>Create Account
                </button>
            </form>

            <p class="mt-6 text-center text-gray-700 dark:text-gray-300">
                Already have an account?
                <a href="login.html" class="text-green-600 hover:underline">Log In Here</a>
            </p>
        </div>
    </main>

    <!-- Footer placeholder -->
    <div id="footer-placeholder"></div>

    <script src="../../js/load-components.js"></script>
    <script src="../../js/feedback-portal.js"></script>
    <script>
        // Use global showNotification if available, otherwise fallback
        function showNotification(message, type = 'success', duration = 3000) {
            if (window.feedbackPortal) {
                window.feedbackPortal.showNotification(message, type, duration);
            } else {
                // Fallback implementation
                const container = document.getElementById("notification-container") || (() => {
                    const div = document.createElement('div');
                    div.id = 'notification-container';
                    div.className = 'fixed inset-0 z-50 flex items-center justify-center pointer-events-none';
                    document.body.appendChild(div);
                    return div;
                })();
                const note = document.createElement('div');
                note.className = `notification ${type}`;
                note.innerHTML = message;
                container.appendChild(note);
                setTimeout(() => note.classList.add('show'), 10);
                setTimeout(() => {
                    note.classList.remove('show');
                    setTimeout(() => note.remove(), 300);
                }, duration);
            }
        }

        document.getElementById("signupForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const fullname = document.getElementById("fullname").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            const role = document.getElementById("role").value;

            if (password !== confirmPassword) {
                showNotification("❌ Passwords do not match", "error");
                return;
            }
            if (password.length < 6) {
                showNotification("❌ Password must be at least 6 characters", "error");
                return;
            }

            const signupData = { fullname, email, password, role };

            try {
                showNotification('Creating account...', 'info', 0);
                const res = await fetch("/api/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Accept": "application/json" },
                    body: JSON.stringify(signupData)
                });

                document.querySelector('.notification')?.remove();

                if (res.ok) {
                    const data = await res.json();
                    showNotification("✅ Account created successfully! Redirecting to login...", "success");
                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 2000);
                } else {
                    let errorMessage = 'Registration failed';
                    try {
                        const error = await res.json();
                        errorMessage = error.detail || error.message || errorMessage;
                    } catch { }
                    showNotification(`❌ ${errorMessage}`, "error");
                }
            } catch (err) {
                console.error(err);
                showNotification("⚠️ Could not connect to server. Please check your connection.", "error");
            }
        });
    </script>
</body>

</html>
