<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>South Eastern Kenya University (SEKU) Feedback System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-white">
    <div id="header-placeholder"></div>

    <main class="flex-grow flex items-center justify-center py-10 px-4 min-h-screen">
        <div class="w-full max-w-md bg-white dark:bg-gray-800 shadow-lg rounded-xl p-6 sm:p-8">
            <h2 class="text-2xl sm:text-3xl font-bold mb-6 text-gray-900 dark:text-gray-100 text-center">Reset Your
                Password</h2>
            <div id="message" class="mb-6 hidden p-3 rounded text-center text-white bg-green-500"></div>
            <form id="forgot-form" class="space-y-5">
                <div>
                    <label for="email" class="block text-gray-700 dark:text-gray-300 text-sm font-medium">Email
                        Address</label>
                    <input type="email" id="email" name="email" required
                        class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500 dark:bg-gray-700 dark:text-white" />
                </div>
                <button type="submit"
                    class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-md transition duration-300">
                    Send Reset Link
                </button>
            </form>
            <p class="mt-6 text-center text-gray-700 dark:text-gray-300">
                Remembered your password?
                <a href="/src/components/pages/login.html" class="text-blue-600 hover:underline">Log In</a>
            </p>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="/src/js/load-components.js"></script>
    <script src="/src/js/feedback-portal.js"></script>
    <script>
        const form = document.getElementById("forgot-form");
        const messageBox = document.getElementById("message");
        form?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = form.email.value;
            try {
                const res = await fetch("http://localhost:8000/api/forgot-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (res.ok) {
                    messageBox.textContent = "📧 Reset link sent to your email.";
                    messageBox.className = "mb-6 p-3 rounded text-center bg-green-500 text-white";
                    setTimeout(() => window.location.href = "/src/components/pages/home.html", 3000);
                } else {
                    messageBox.textContent = data.detail || "User not found.";
                    messageBox.className = "mb-6 p-3 rounded text-center bg-red-500 text-white";
                }
                messageBox.classList.remove("hidden");
            } catch (err) {
                console.error(err);
                messageBox.textContent = "⚠️ Could not reach server.";
                messageBox.className = "mb-6 p-3 rounded text-center bg-red-500 text-white";
                messageBox.classList.remove("hidden");
            }
        });
    </script>
</body>

</html>
