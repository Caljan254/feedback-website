<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>South Eastern Kenya University (SEKU) Feedback System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .form-container {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .input-group {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
        }

        .input-field {
            padding-left: 45px;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #6b7280;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .centered-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 300px;
        }
    </style>
</head>

<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-white min-h-screen flex flex-col gradient-bg">
    <div id="header-placeholder"></div>

    <main class="flex-grow flex items-center justify-center px-4 py-8">
        <div class="w-full max-w-lg form-container rounded-2xl shadow-2xl overflow-hidden fade-in">
            <div class="p-8">
                <div class="text-center mb-8">
                    <div
                        class="h-16 w-16 mx-auto mb-4 rounded-full bg-white bg-opacity-20 flex items-center justify-center">
                        <i class="fas fa-lock text-white text-2xl"></i>
                    </div>
                    <h2 class="text-3xl font-bold text-white">Set New Password</h2>
                    <p class="text-white text-opacity-80 mt-2">Create a strong, secure password</p>
                </div>

                <div id="message" class="mb-6 hidden p-4 rounded-lg text-center text-white font-medium"></div>

                <form id="reset-form" class="space-y-6">
                    <input type="hidden" id="token" value="" />
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="new-password" required placeholder="Enter new password"
                            class="input-field w-full px-4 py-3 bg-white dark:bg-gray-800 bg-opacity-90 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:text-gray-100 transition" />
                        <span class="password-toggle" id="password-toggle-1"><i class="fas fa-eye"></i></span>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="confirm-password" required placeholder="Confirm new password"
                            class="input-field w-full px-4 py-3 bg-white dark:bg-gray-800 bg-opacity-90 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:text-gray-100 transition" />
                        <span class="password-toggle" id="password-toggle-2"><i class="fas fa-eye"></i></span>
                    </div>
                    <div id="password-match" class="hidden text-sm text-green-500 flex items-center">
                        <i class="fas fa-check-circle mr-2"></i><span>Passwords match</span>
                    </div>
                    <button type="submit" id="submit-btn"
                        class="w-full bg-white text-purple-600 hover:bg-opacity-90 font-bold py-3 rounded-lg transition-all duration-300 flex items-center justify-center">
                        <span>Reset Password</span><i class="fas fa-key ml-2"></i>
                    </button>
                </form>

                <p class="mt-6 text-center text-white">
                    Remembered your password?
                    <a href="/src/components/pages/login.html"
                        class="font-semibold text-blue-200 hover:underline transition">Back to Login</a>
                </p>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="/src/js/load-components.js"></script>
    <script src="/src/js/feedback-portal.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        if (!token) {
            alert('Invalid or missing reset token.');
            window.location.href = '/src/components/pages/forgot-password.html';
        }
        document.getElementById('token').value = token;

        const newPass = document.getElementById('new-password');
        const confirmPass = document.getElementById('confirm-password');
        const matchDiv = document.getElementById('password-match');

        function checkMatch() {
            if (newPass.value && confirmPass.value) {
                if (newPass.value === confirmPass.value) {
                    matchDiv.classList.remove('hidden', 'text-red-500');
                    matchDiv.classList.add('flex', 'text-green-500');
                    matchDiv.innerHTML = '<i class="fas fa-check-circle mr-2"></i><span>Passwords match</span>';
                } else {
                    matchDiv.classList.remove('hidden', 'text-green-500');
                    matchDiv.classList.add('flex', 'text-red-500');
                    matchDiv.innerHTML = '<i class="fas fa-times-circle mr-2"></i><span>Passwords do not match</span>';
                }
            } else {
                matchDiv.classList.add('hidden');
            }
        }
        newPass.addEventListener('input', checkMatch);
        confirmPass.addEventListener('input', checkMatch);

        document.getElementById('password-toggle-1').addEventListener('click', () => {
            const type = newPass.type === 'password' ? 'text' : 'password';
            newPass.type = type;
            document.getElementById('password-toggle-1').innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
        });
        document.getElementById('password-toggle-2').addEventListener('click', () => {
            const type = confirmPass.type === 'password' ? 'text' : 'password';
            confirmPass.type = type;
            document.getElementById('password-toggle-2').innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
        });

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (newPass.value !== confirmPass.value) {
                window.feedbackPortal.showNotification('Passwords do not match', 'error');
                return;
            }
            if (newPass.value.length < 8) {
                window.feedbackPortal.showNotification('Password must be at least 8 characters', 'error');
                return;
            }
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Resetting...';
            submitBtn.disabled = true;

            try {
                const res = await fetch("http://localhost:8000/api/reset-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token, new_password: newPass.value })
                });
                const data = await res.json();
                if (res.ok) {
                    window.feedbackPortal.showNotification('✅ Password reset successful! Redirecting to login...', 'success');
                    setTimeout(() => window.location.href = '/src/components/pages/login.html', 3000);
                } else {
                    window.feedbackPortal.showNotification(`❌ ${data.detail || 'Reset failed'}`, 'error');
                    submitBtn.innerHTML = '<span>Reset Password</span><i class="fas fa-key ml-2"></i>';
                    submitBtn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                window.feedbackPortal.showNotification('⚠️ Could not connect to server.', 'error');
                submitBtn.innerHTML = '<span>Reset Password</span><i class="fas fa-key ml-2"></i>';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
