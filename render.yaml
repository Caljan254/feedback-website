services:
  - type: web
    name: seku-feedback-portal
    env: python
    # Build frontend first, then install backend requirements
    buildCommand: "npm --prefix frontend install && npm --prefix frontend run build && pip install -r backend/requirements.txt"
    # Start the backend server which also serves the frontend dist
    startCommand: "gunicorn -k uvicorn.workers.UvicornWorker --chdir backend main:app -b 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: seku-feedback-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://seku-feedback-portal.onrender.com # Change if you use a different name
      - key: PYTHON_VERSION
        value: 3.10.0

databases:
  - name: seku-feedback-db
    plan: free # Use Render's free tier PostgreSQL
